<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body {
    margin: 0;
    padding: 20px 22px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px;
    border-radius: 8px;
    font-weight: 500; font-size: 13px;
    border: 0;
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
    transition: all 150ms var(--ease-out);
  }
  .primary     { background: var(--accent);       color: var(--accent-fg); }
  .secondary   { background: var(--secondary);    color: var(--secondary-fg); }
  .ghost       { background: transparent;         color: var(--fg1); }
  .ghost:hover { background: var(--muted); }
  .outline     { background: transparent;         color: var(--fg1); border: 1px solid var(--border); }
  .destructive { background: var(--destructive);  color: var(--destructive-fg); }
  .icon-only   { padding: 8px; }
  .sm          { padding: 6px 10px; font-size: 12px; }

  svg {
    width: 14px; height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
</style></head><body>
  <div class="row">
    <button class="btn primary">
      <svg viewBox="0 0 24 24"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></svg>
      Ask
    </button>
    <button class="btn secondary">Cancel</button>
    <button class="btn ghost">Ghost</button>
    <button class="btn outline">
      <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      New
    </button>
    <button class="btn destructive">
      <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      Delete
    </button>
    <button class="btn ghost icon-only" aria-label="More">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </button>
  </div>

  <div class="row">
    <button class="btn primary sm">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Ingest
    </button>
    <button class="btn outline sm">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/><polyline points="1 20 1 14 7 14"/></svg>
      Retry
    </button>
    <button class="btn ghost sm">
      <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      Filter
    </button>
    <button class="btn outline sm">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </button>
  </div>
</body></html>
