<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Nav Pill</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:30px; background: var(--bg); display:flex; justify-content:center; }
  .nav { display: inline-flex; background: oklch(0.21 0 0 / 0.6); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 999px; padding: 4px; gap: 2px; }
  .item { display:inline-flex; align-items:center; gap:8px; padding: 8px 16px; border-radius: 999px; font-size: 14px; font-weight: 500; color: var(--fg2); cursor: pointer; transition: all 200ms; }
  .item:hover { color: var(--fg1); background: var(--muted); }
  .item.active { background: var(--accent); color: var(--accent-fg); }
  svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style></head><body>
