<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Color — Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; }
  .chip { height: 72px; border-radius: 8px; border: 1px solid var(--border); }
  .name { font-size: 11px; color: var(--fg1); margin-top: 8px; font-weight: 500; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg2); margin-top: 2px; line-height: 1.3; }
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="name">bg</div><div class="val">oklch(0.14 0 0)</div></div>
    <div class="sw"><div class="chip" style="background:var(--card)"></div><div class="name">card</div><div class="val">oklch(0.21 0 0)</div></div>
    <div class="sw"><div class="chip" style="background:var(--popover)"></div><div class="name">popover</div><div class="val">oklch(0.27 0 0)</div></div>
    <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="name">muted</div><div class="val">oklch(0.27 0 0)</div></div>
    <div class="sw"><div class="chip" style="background:var(--sidebar)"></div><div class="name">sidebar</div><div class="val">oklch(0.20 0 0)</div></div>
  </div>
</body></html>
