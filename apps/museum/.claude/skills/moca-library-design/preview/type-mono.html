<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Type — Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background: var(--bg); }
  .block { background: var(--popover); border:1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-family: var(--font-mono); font-size: 13px; line-height: 1.7; color: var(--fg1); }
  .c { color: var(--accent); }
  .m { color: var(--fg2); }
  .note { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); margin-top: 10px; }
</style></head><body>
  <div class="block">
<span class="m"># get entity by id</span>
<span class="c">GET</span> /api/entities/<span class="c">:id</span>
<span class="m">→ 200 OK · 14 relationships · 3 communities</span>
  </div>
  <div class="note">JetBrains Mono · 400 · 14/1.6 · code blocks, entity IDs, graph queries</div>
</body></html>
