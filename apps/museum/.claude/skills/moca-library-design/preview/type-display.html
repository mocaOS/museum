<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--bg); }
  .disp { font-size: 44px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; color: var(--fg1); }
  .grad { background: linear-gradient(to right, var(--fg1), var(--fg2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); margin-top: 14px; }
</style></head><body>
  <div class="disp grad">Knowledge, graphed.</div>
  <div class="spec">Inter · 700 · 32–44px · -0.02em · line-height 1.2 · text-gradient allowed</div>
</body></html>
