<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background: var(--bg); color: var(--fg1); }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .bar { background: var(--accent); height: 14px; border-radius: 3px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); width: 110px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg1); }
</style></head><body>
  <div class="row"><span class="tag">--space-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="tag">--space-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="tag">--space-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="tag">--space-4</span><div class="bar" style="width:16px"></div><span class="val">16px · standard</span></div>
  <div class="row"><span class="tag">--space-6</span><div class="bar" style="width:24px"></div><span class="val">24px · card</span></div>
  <div class="row"><span class="tag">--space-8</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="tag">--space-12</span><div class="bar" style="width:48px"></div><span class="val">48px · section</span></div>
</body></html>
