# MOCA × Hyperfy — host multiple walkable exhibition worlds on one box.
#
# Each world is one engine container with its own folder (SQLite db + assets)
# and its own admin key. Visitors walk in via the browser; curators spawn
# exhibitions with the museum builder's "Spawn to Hyperfy" dialog or
# spawn-exhibition.mjs. Add a service per world and point a (sub)domain at
# its port via your proxy (Coolify/Traefik handles TLS + WebSockets).
#
# For a single world with a full deploy guide, start from ./world-template.
#
# Setup per world:
#   mkdir -p worlds/<name> && sudo chown -R 1001 worlds/<name>
#
# IMPORTANT: set ADMIN_CODE on every world — a blank code makes every visitor
# a builder, which is fine for a sandbox and chaos for a public exhibition.

x-world: &world
  image: ghcr.io/hyperfy-xyz/hyperfy:v0.16.0 # protocol version the MOCA spawner is tested against
  restart: unless-stopped
  environment: &world-env
    WORLD: world
    PORT: 3000
    SAVE_INTERVAL: 30
    PUBLIC_PLAYER_COLLISION: "false"
    PUBLIC_MAX_UPLOAD_SIZE: 64 # MOCA room models run 5–40 MB
    ASSETS: local
    DB_URI: local
    CLEAN: "true"

services:
  world-genesis:
    <<: *world
    ports:
      - "3401:3000"
    environment:
      <<: *world-env
      ADMIN_CODE: ${GENESIS_ADMIN_CODE:?set me}
      JWT_SECRET: ${GENESIS_JWT_SECRET:?set me}
      PUBLIC_WS_URL: wss://genesis.worlds.museumofcryptoart.com/ws
      PUBLIC_API_URL: https://genesis.worlds.museumofcryptoart.com/api
      ASSETS_BASE_URL: https://genesis.worlds.museumofcryptoart.com/assets
    volumes:
      - ./worlds/genesis:/app/world

  world-decc0s:
    <<: *world
    ports:
      - "3402:3000"
    environment:
      <<: *world-env
      ADMIN_CODE: ${DECC0S_ADMIN_CODE:?set me}
      JWT_SECRET: ${DECC0S_JWT_SECRET:?set me}
      PUBLIC_WS_URL: wss://decc0s.worlds.museumofcryptoart.com/ws
      PUBLIC_API_URL: https://decc0s.worlds.museumofcryptoart.com/api
      ASSETS_BASE_URL: https://decc0s.worlds.museumofcryptoart.com/assets
    volumes:
      - ./worlds/decc0s:/app/world

  # Community worlds: copy a block per curator/show. Each world is isolated —
  # its own db, assets, admin key — so curators can't step on each other.
  world-community:
    <<: *world
    ports:
      - "3403:3000"
    environment:
      <<: *world-env
      ADMIN_CODE: ${COMMUNITY_ADMIN_CODE:?set me}
      JWT_SECRET: ${COMMUNITY_JWT_SECRET:?set me}
      PUBLIC_WS_URL: wss://community.worlds.museumofcryptoart.com/ws
      PUBLIC_API_URL: https://community.worlds.museumofcryptoart.com/api
      ASSETS_BASE_URL: https://community.worlds.museumofcryptoart.com/assets
    volumes:
      - ./worlds/community:/app/world
